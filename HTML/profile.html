<!DOCTYPE html>
<html lang="en">
<!--
  ============================================================
  profile.html — User Profile Page for GamerFeed
  ============================================================
  Displays a user's profile information (avatar, username, email,
  bio, stats) and all of their posts.

  The page reads a "user" query parameter from the URL to decide
  which profile to show. If no parameter is provided, it defaults
  to the logged-in user's own profile.

  Own profile: shows "Edit Profile" button, hides "Follow" button.
  Other user:  shows "Follow / Unfollow" button, hides "Edit".

  POST DISPLAY NOTE:
  Posts on this page use the SAME card structure as the main feed
  (index.html). Content is truncated to ~3 lines via CSS, and
  clicking a card opens a modal with the full content, comments,
  and like/comment/delete actions. This provides consistent UX.
  See: https://developer.mozilla.org/en-US/docs/Web/CSS/max-height

  RESOURCES:
  - Semantic HTML5: https://developer.mozilla.org/en-US/docs/Web/HTML/Element
  - Flexbox layout: https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_flexible_box_layout
  - ARIA roles: https://developer.mozilla.org/en-US/docs/Web/Accessibility/ARIA/Roles
  ============================================================
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GamerFeed - Profile</title>
  <link rel="stylesheet" href="../CSS/profile.css" />
</head>

<body>
  <!-- ═══════ HEADER ═══════ -->
  <header>
    <div class="logo" onclick="goHome()">GAMER<span>FEED</span></div>
    <input type="text" placeholder="Search games, players, achievements..." aria-label="Search" />
    <button class="btn-post" onclick="goHome()">+ POST</button>

    <!-- Theme toggle -->
    <button id="themeToggleBtn" class="btn-theme" aria-label="Toggle theme"></button>

    <div class="avatar-chip" id="headerAvatar">GX</div>
    <button id="logoutBtn" class="btn-logout">Logout</button>
  </header>

  <!-- ═══════ 3-COLUMN LAYOUT ═══════ -->
  <!-- See: https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_flexible_box_layout -->
  <div class="app-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar-left">
      <nav>
        <div class="nav-label">MAIN</div>
        <div class="nav-item" onclick="goHome()">Feed</div>
        <div class="nav-item" onclick="goHome()">Following</div>
        <div class="nav-item">Trending</div>
        <div class="nav-item">Achievements</div>
        <div class="nav-item">Discussion</div>

        <div class="nav-label">YOU</div>
        <div class="nav-item active" onclick="openMyProfile()">My Profile</div>
        <div class="nav-item">My Achievements</div>
        <div class="nav-item">Saved Posts</div>

        <div class="nav-label">GAMES</div>
        <div class="nav-item">Browse Games</div>
      </nav>
    </aside>

    <!-- MAIN — Profile card + user posts -->
    <main class="main-content">
      <section class="profile-card">
        <div class="profile-top">
          <div class="profile-avatar green" id="profileAvatar">GX</div>

          <div class="profile-info">
            <div class="profile-name-row">
              <h2 id="profileUsername">Username</h2>
              <span class="profile-badge" id="profileOwnerBadge">YOU</span>
            </div>

            <div class="profile-email" id="profileEmail">email@example.com</div>
            <p class="profile-bio" id="profileBio">No bio yet.</p>

            <!-- Stats: posts, followers, following -->
            <div class="profile-stats">
              <div class="profile-stat">
                <span class="profile-stat-number" id="profilePostsCount">0</span>
                <span class="profile-stat-label">Posts</span>
              </div>
              <div class="profile-stat">
                <span class="profile-stat-number" id="profileFollowersCount">0</span>
                <span class="profile-stat-label">Followers</span>
              </div>
              <div class="profile-stat">
                <span class="profile-stat-number" id="profileFollowingCount">0</span>
                <span class="profile-stat-label">Following</span>
              </div>
            </div>
          </div>

          <!-- Action buttons: Edit (own) or Follow (other) -->
          <div class="profile-actions">
            <button class="btn-submit" id="editProfileBtn" onclick="openEditProfile()">Edit Profile</button>
            <button class="btn-submit" id="followToggleBtn" onclick="toggleFollowUser()">Follow</button>
          </div>
        </div>
      </section>

      <!-- User's posts section -->
      <section class="profile-posts-section">
        <div class="section-heading">POSTS</div>
        <div id="profilePostsContainer"></div>
      </section>
    </main>

    <!-- RIGHT SIDEBAR -->
    <!-- <aside class="sidebar-right">
      <div class="widget">
        <div class="widget-title">PROFILE INFO</div>
        <div class="profile-side-info">
          <div><strong>Username:</strong> <span id="sideUsername">-</span></div>
          <div><strong>Bio:</strong> <span id="sideBio">-</span></div>
        </div>
      </div>
    </aside>
  </div> -->

  <!-- ═══════ EDIT PROFILE MODAL ═══════ -->
  <div class="modal-overlay" id="editProfileModal">
    <div class="modal">
      <div class="modal-top-bar"></div>

      <div class="modal-header">
        <div>
          <div class="modal-heading">Edit Profile</div>
          <div class="modal-subheading">Update your public information</div>
        </div>
        <div class="modal-close" onclick="closeEditProfile()">✕</div>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="editUsernameInput">Username</label>
          <input type="text" id="editUsernameInput" maxlength="30" />
        </div>

        <div class="form-group">
          <label for="editBioInput">Bio</label>
          <textarea id="editBioInput" rows="4" maxlength="200"></textarea>
        </div>

        <div class="modal-actions">
          <button class="modal-action-btn" onclick="closeEditProfile()">Cancel</button>
          <button class="btn-submit" onclick="saveProfileEdits()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════ POST DETAIL MODAL ═══════ -->
  <!--
    This modal shows the FULL post content (no truncation),
    all comments, and interactive like/comment actions.
    It mirrors the modal from index.html so the profile page
    has the same post interaction functionality.
    See: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/article
  -->
  <div class="modal-overlay" id="postModalOverlay" onclick="handlePostModalOverlayClick(event)">
    <article class="modal post-detail-modal">
      <div class="modal-top-bar" id="postModalTopBar"></div>

      <div class="modal-header">
        <div class="av green" id="postModalAvatar" style="width:44px;height:44px;border-radius:6px;font-size:16px;"></div>
        <div>
          <div style="font-size:14px;font-weight:bold" id="postModalUsername"></div>
          <div style="font-size:11px;color:#555" id="postModalTimestamp"></div>
        </div>
        <div class="modal-close" onclick="closePostModal()">✕</div>
      </div>

      <div class="modal-body">
        <div class="modal-title" id="postModalTitle"></div>
        <div class="modal-text" id="postModalContent"></div>
        <div class="modal-actions">
          <button class="modal-action-btn" id="postModalLikeBtn" onclick="modalPostToggleLike()">
            <span id="postModalLikesCount">0</span> Likes
          </button>
          <button class="modal-action-btn">Comment</button>
          <button class="modal-action-btn">Share</button>
          <button class="modal-action-btn">Save</button>
        </div>
      </div>

      <!-- Comments section -->
      <div class="comments-section">
        <div class="comments-header">COMMENTS <span id="postModalCommentsLabel">(0)</span></div>
        <div class="comment-input-row">
          <textarea id="postModalCommentInput" rows="2" placeholder="Join the discussion..." aria-label="Write a comment"></textarea>
          <button class="btn-comment" onclick="submitProfileComment()">POST</button>
        </div>
        <div id="postModalCommentsList"></div>
      </div>
    </article>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert"></div>

  <script src="../JS/config.js"></script>
  <script src="../JS/theme.js"></script>
  <script src="../JS/profile.js"></script>
</body>
</html>
