<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GamerFeed | Login</title>
  <link rel="stylesheet" href="../CSS/auth.css" />
</head>
<body>

<main class="auth-page">
  <section class="auth-shell">

    <!-- LEFT SIDE -->
    <div class="brand-panel">
      <h1 class="logo">
        <span class="green">GAMER</span><span class="orange">FEED</span>
      </h1>

      <p class="tagline">
        Share achievements. Discover players. Stay in the game.
      </p>

      <div class="feature-box">
        <p>🎮 Track achievements</p>
        <p>🔥 Follow top players</p>
        <p>💬 Join discussions</p>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="form-panel">

      <form id="loginForm" novalidate>
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to continue</p>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter email" />
          <small id="emailError"></small>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" />
          <small id="passwordError"></small>
        </div>

        <small id="loginMessage"></small>

        <button type="submit" class="btn-primary">LOGIN</button>

        <a href="register.html" class="btn-secondary">CREATE ACCOUNT</a>
      </form>

    </div>
  </section>
</main>

<script src="../js/auth.js"></script>
</body>
</html>
