<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GamerFeed - Interactions</title>
  <link rel="stylesheet" href="CommentSystem.css" />
</head>
<body>
  <main class="page-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-green">GAMER</span><span class="brand-orange">FEED</span>
      </div>

      <div class="topbar-actions">
        <input
          class="search-box"
          type="text"
          placeholder="Search games, players, achievements"
        />
        <button class="post-btn">+ POST</button>
      </div>
    </header>

    <nav class="feed-tabs">
      <button class="tab active">ALL</button>
      <button class="tab">UPDATES</button>
      <button class="tab">ACHIEVEMENTS</button>
      <button class="tab">DISCUSSIONS</button>
    </nav>

    <section id="feedContainer" class="feed-list">
      <!-- Posts render here -->
    </section>
  </main>

  <script src="CommentSystem.js"></script>
</body>
</html>
